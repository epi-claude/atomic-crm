<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
        />
        <meta name="theme-color" content="#000000" />
        <link rel="manifest" href="./manifest.json" />
        <link rel="shortcut icon" href="./favicon.ico" />
        <title>Atomic CRM</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            .loader-container {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
                background-color: #fafafa;
            }

            /* CSS Spinner from https://projects.lukehaas.me/css-loaders/ */

            .loader,
            .loader:before,
            .loader:after {
                border-radius: 50%;
            }

            .loader {
                color: #283593;
                font-size: 11px;
                text-indent: -99999em;
                margin: 55px auto;
                position: relative;
                width: 10em;
                height: 10em;
                box-shadow: inset 0 0 0 1em;
                -webkit-transform: translateZ(0);
                -ms-transform: translateZ(0);
                transform: translateZ(0);
            }

            .loader:before,
            .loader:after {
                position: absolute;
                content: '';
            }

            .loader:before {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 10.2em 0 0 10.2em;
                top: -0.1em;
                left: -0.1em;
                -webkit-transform-origin: 5.2em 5.1em;
                transform-origin: 5.2em 5.1em;
                -webkit-animation: load2 2s infinite ease 1.5s;
                animation: load2 2s infinite ease 1.5s;
            }

            .loader:after {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 0 10.2em 10.2em 0;
                top: -0.1em;
                left: 5.1em;
                -webkit-transform-origin: 0px 5.1em;
                transform-origin: 0px 5.1em;
                -webkit-animation: load2 2s infinite ease;
                animation: load2 2s infinite ease;
            }

            @-webkit-keyframes load2 {
                0% {
                    -webkit-transform: rotate(0deg);
                    transform: rotate(0deg);
                }
                100% {
                    -webkit-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }

            @keyframes load2 {
                0% {
                    -webkit-transform: rotate(0deg);
                    transform: rotate(0deg);
                }
                100% {
                    -webkit-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

    <body>
        <noscript> You need to enable JavaScript to run this app. </noscript>
        <div id="root">
            <div class="loader-container">
                <div class="loader">Loading...</div>
            </div>
        </div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        var SUPABASE_URL = 'https://vmyvjxsjxxyepbvlfdwd.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_fsRsiO8qtD1otvHTjTT5Mg_gDaAmJ-D';

        async function interceptAuthCallback() {
            // PKCE flow: Supabase sends ?code=XXX&type=YYY as query params
            var queryParams = new URLSearchParams(window.location.search);
            var code = queryParams.get('code');
            var queryType = queryParams.get('type');

            if (code) {
                if (queryType === 'recovery' || queryType === 'invite') {
                    // Exchange the code for a session here, before entering React,
                    // so ra-supabase-core receives access_token + refresh_token as it expects.
                    try {
                        var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                        var result = await client.auth.exchangeCodeForSession(code);
                        if (result.data && result.data.session) {
                            var s = result.data.session;
                            window.location.href =
                                './#/set-password?access_token=' + encodeURIComponent(s.access_token) +
                                '&refresh_token=' + encodeURIComponent(s.refresh_token) +
                                '&type=' + encodeURIComponent(queryType);
                            return;
                        }
                    } catch (e) {
                        console.error('PKCE exchange failed', e);
                    }
                    window.location.href = './#/login?error=invalid_link';
                    return;
                }
                // Other PKCE flows (e.g. SSO): pass code through to the SPA
                window.location.href = './#/auth-callback?code=' + encodeURIComponent(code) + '&type=' + encodeURIComponent(queryType || '');
                return;
            }

            // Implicit flow: Supabase sends #access_token=XXX&refresh_token=YYY&type=ZZZ as hash
            var hashParams = new URLSearchParams(window.location.hash.substring(1));
            var access_token = hashParams.get('access_token');
            var refresh_token = hashParams.get('refresh_token');
            var type = hashParams.get('type');

            if (type === 'recovery' || type === 'invite') {
                window.location.href = './#/set-password?access_token=' + encodeURIComponent(access_token) +
                    '&refresh_token=' + encodeURIComponent(refresh_token) + '&type=' + encodeURIComponent(type);
            } else {
                window.location.href = './#/auth-callback?access_token=' + encodeURIComponent(access_token) +
                    '&refresh_token=' + encodeURIComponent(refresh_token) + '&type=' + encodeURIComponent(type || '');
            }
        }

        interceptAuthCallback();
    </script>
</html>
